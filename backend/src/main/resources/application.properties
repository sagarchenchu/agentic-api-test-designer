server.port=8080
spring.application.name=agentic-api-test-designer-backend

spring.datasource.url=jdbc:h2:mem:agentic;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4.1-mini
openai.enabled=false

jira.enabled=${JIRA_ENABLED:false}
jira.base-url=${JIRA_BASE_URL:}
jira.email=${JIRA_EMAIL:}
jira.api-token=${JIRA_API_TOKEN:}

security.enabled=${SECURITY_ENABLED:false}
security.api-token=${AGENTIC_API_TOKEN:}

agent.allowed-project-roots=${AGENT_ALLOWED_PROJECT_ROOTS:}
agent.allow-any-local-path=${AGENT_ALLOW_ANY_LOCAL_PATH:true}
